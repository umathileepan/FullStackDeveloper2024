<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device, initial-scale=1.0">
    <title>Cafe Menu Self Creation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div class="menu">
        <section>
            <h1>CAMPER CAFE</h1>
            <p class="established">Est. 2023</p>
            <hr>
        </section>
        <section>
            <h2>Coffee</h2>
            <img src="https://cdn.freecodecamp.org/curriculum/css-cafe/coffee.jpg" alt="coffee icon">
            <article class="item">
                <p class="flavour">French Vanila</p><p class="price">3.00</p>
            </article>
            <article class="item">
                <p class="flavour">Caramel Macchiato</p><p class="price">3.75</p>
            </article>
            <article class="item">
                <p class="flavour">Pumkin Spice</p><p class="price">4.00</p>
            </article>
            <article class="item">
                <p class="flavour">Hazelnut</p><p class="price">4.50</p>
            </article>
            <article class="item">
                <p class="flavour">Mocha</p><p class="price">3.50</p>
            </article>
        </section>
        <section>
            <h2>Desserts</h2>
            <img src="https://cdn.freecodecamp.org/curriculum/css-cafe/pie.jpg" alt="Desserts">
            <article class="item">
                <p class="flavour">Donut</p><p class="price">1.50</p>
            </article>
            <article class="item">
                <p class="flavour">Cherry Pie</p><p class="price">2.75</p>
            </article>
            <article class="item">
                <p class="flavour">Cheesecake</p><p class="price">3.00</p>
            </article>
            <article class="item">
                <p class="flavour">Cinnamon Roll</p><p class="price">2.50</p>
            </article>
        </section>
            <hr>
        <footer>
            <p><a href="">Visit our website</a></p>
            <p>Owner: Uma</p>
        </footer>    
        </div>       
    </main>
</body>
</html>
