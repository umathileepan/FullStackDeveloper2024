<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Registration Form</h1>
    <p>Please fill out this form with the required information</p>
    <fieldset>
        <label for="first-name">Enter Your First Name: <input id="first-name" type="text"></label>
        <label for="last-name">Enter Your Last Name: <input id="last-name" type="text"></label>
        <label for="email">Enter Your Email: <input id="email" type="email"> </label>
        <label for="password">Creat a New Password: <input id="password" type="password"></label>
    </fieldset>
    <fieldset>
        <label>Account type(required)</label>
        <label for="business"><input id="business" name="account-type" type="radio" checked>Business</label>
        <label for="personal"><input id="personal" name="account-type" type="radio">Personal</label>
    </fieldset>
    <fieldset>

    </fieldset>
</body>
</html>
