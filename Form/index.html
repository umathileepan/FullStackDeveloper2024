<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Registration Form</h1>
    <p>Please fill out this form with the required information</p>
    <form action="C:\Users\thile\OneDrive\Documents\Dec2023-2024\FullStackDeveloper2024\ColorMarker" method="post">
    <fieldset>
        <label for="first-name">Enter Your First Name: <input id="first-name" name="first-name" type="text"></label>
        <label for="last-name">Enter Your Last Name: <input id="last-name" name="last-name" type="text"></label>
        <label for="email">Enter Your Email: <input id="email" name="email" type="email"> </label>
        <label for="password">Creat a New Password: <input id="password" name="password" type="password"></label>
    </fieldset>
    <fieldset class="inline">
        <label>Account type(required)</label>
        <label for="business"><input id="business" name="account-type" type="radio" checked>Business</label>
        <label for="personal"><input id="personal" name="account-type" type="radio">Personal</label>
    </fieldset>
    <fieldset>
        <label>Upload a Profile Picture: </label>
        <label for="Picture"><input id="picture" name="picture" type="file"></label>
        <label for="age">Input your age(years):<input id="age" name="age" type="number"></label>
        <label for="aboutus">How did you hear about us?
            <select id="aboutus" name="aboutUs">
                <option value="">(Select one)</option>
                <option value=1>UmaThileepan.com</option>
                <option value=2>UmaThileepanFacebook</option>
                <option value=3>UmaThileepanInsta</option>
                <option value=4>UmaThileepanLinkedIn</option>
                <option value=5>UmaThileepanTwitter</option>
                <option value=6>Other</option>
            </select>
        </label>
        <label for="bio">Provide a bio: </label>
        <textarea name="bio" id="bio" cols="30" rows="3" placeholder="I love coding all the time..."></textarea>
        <label for="agreement"><input id="agreement" name="agreement" type="checkbox">I accept the <a href="">terms and conditions</a></label>
        <input type="submit" Value="Submit">
    </fieldset>
</form>
</body>
</html>
